
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#wrap { display: flex; flex-direction: column; align-items: center; padding: 0.5rem 0; }
#ui { max-width: 620px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 4px 6px; }
#score-display { font-weight: 500; font-size: 15px; color: var(--color-text-primary); }
#hi-display { font-size: 13px; color: var(--color-text-secondary); }
#gameCanvas { display: block; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); touch-action: none; max-width: 620px; width: 100%; }
#canvasWrap { position: relative; max-width: 620px; width: 100%; }
</style>

<div id="wrap">
  <div id="ui">
    <span id="score-display">Punkte: 0</span>
    <span id="hi-display">Best: 0</span>
  </div>
  <div id="canvasWrap">
    <canvas id="gameCanvas" width="620" height="240"></canvas>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 620, H = 240;
const GROUND_Y = H - 36;
const GRAVITY  = 0.62;
const JUMP_FORCE = -13.5;
const RESTART_DELAY = 120; // frames (~2 sec) before tapping restarts

let state = 'idle';
let score = 0, hiScore = 0, frame = 0, speed = 4.5;
let deathFrame = 0, flashAlpha = 0;
let kathyDead = {x:0, y:0, leg:0};

let kathy = { x:80, y:GROUND_Y, vy:0, w:30, h:52, onGround:true, leg:0 };
let obstacles = [], nextObs = 110;
let bgX = 0;
let clouds = [{x:80,y:22},{x:230,y:14},{x:390,y:28},{x:530,y:10}];

function tryJump() {
  if (state === 'idle') { startGame(); return; }
  if (state === 'dead') {
    if (deathFrame >= RESTART_DELAY) startGame();
    return;
  }
  if (state === 'running' && kathy.onGround) {
    kathy.vy = JUMP_FORCE;
    kathy.onGround = false;
  }
}

function startGame() {
  obstacles=[]; score=0; frame=0; speed=4.5;
  kathy.y=GROUND_Y; kathy.vy=0; kathy.onGround=true;
  nextObs=110; deathFrame=0; flashAlpha=0;
  state='running';
}

canvas.addEventListener('click', tryJump);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); tryJump(); },{passive:false});

// ---- BACKGROUND ----
function drawBgTile(ox) {
  const W2=620;
  ctx.fillStyle='#c9b89e'; ctx.fillRect(ox,52,W2,GROUND_Y-52);
  ctx.fillStyle='#b0a08a'; ctx.fillRect(ox,50,W2,7);
  const bayW=60, numBays=Math.ceil(W2/bayW)+2;
  for(let i=0;i<numBays;i++){
    const bx=ox+i*bayW;
    ctx.fillStyle='#b8a88e'; ctx.fillRect(bx,52,7,GROUND_Y-52);
    [[bx+10,62,16,26],[bx+32,62,16,26],[bx+10,96,16,26],[bx+32,96,16,26]].forEach(([wx,wy,ww,wh])=>{
      ctx.fillStyle='#8faabb'; ctx.fillRect(wx,wy,ww,wh);
      ctx.fillStyle='#a09080'; ctx.fillRect(wx-1,wy+wh,ww+2,3);
      ctx.fillStyle='#7a9aab';
      ctx.beginPath();ctx.ellipse(wx+ww/2,wy,ww/2,5,0,Math.PI,0);ctx.fill();
      ctx.strokeStyle='#c9b89e';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);
      ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();
    });
  }
  for(let i=0;i<numBays;i++){
    const ax=ox+i*bayW;
    ctx.fillStyle='#a89880'; ctx.fillRect(ax,140,7,GROUND_Y-140);
    ctx.fillStyle='#7a6a58'; ctx.fillRect(ax+7,150,44,GROUND_Y-150);
    ctx.beginPath();ctx.ellipse(ax+29,150,22,11,0,Math.PI,0);ctx.fill();
  }
  ctx.fillStyle='#9a8a78'; ctx.fillRect(ox,GROUND_Y,W2,H-GROUND_Y);
  ctx.strokeStyle='#887868'; ctx.lineWidth=0.7;
  for(let i=0;i<11;i++){ctx.beginPath();ctx.moveTo(ox+i*62,GROUND_Y);ctx.lineTo(ox+i*62,H);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(ox,GROUND_Y+16);ctx.lineTo(ox+W2,GROUND_Y+16);ctx.stroke();
  ctx.fillStyle='#b89a60'; ctx.fillRect(ox,GROUND_Y,W2,4);
}

function drawBackground() {
  let grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0,'#b8d8f0'); grad.addColorStop(1,'#dceefa');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,GROUND_Y);
  ctx.fillStyle='rgba(255,255,255,0.82)';
  clouds.forEach(c=>{
    ctx.beginPath();ctx.ellipse(c.x,c.y,24,10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x+14,c.y-5,17,9,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x-13,c.y-3,14,8,0,0,Math.PI*2);ctx.fill();
  });
  const off=((bgX%W)+W)%W;
  drawBgTile(-off); drawBgTile(W-off);
}

// ---- KATHY ----
function drawKathy(x, feetY, legPhase, isDead, deathF) {
  ctx.save();
  ctx.translate(x, feetY);
  if(isDead) ctx.rotate(Math.min(deathF*0.065, Math.PI*0.55));

  const lp = legPhase;
  const leg1 = isDead ? 16 : Math.sin(lp)*11;
  const leg2 = isDead ? 3  : -Math.sin(lp)*11;
  const THIGH = 22;

  ctx.fillStyle='#1e2e5a';
  ctx.fillRect(-7,-THIGH,11,THIGH+leg1);
  ctx.fillStyle='#111827';
  ctx.fillRect(-9,leg1,14,5);

  ctx.fillStyle='#2c3e6b';
  ctx.fillRect(2,-THIGH,11,THIGH+leg2);
  ctx.fillStyle='#111827';
  ctx.fillRect(0,leg2,15,5);

  const bodyTop=-THIGH-22, bodyBot=-THIGH+2;
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.roundRect(-13,bodyTop,28,bodyBot-bodyTop,3);ctx.fill();
  ctx.fillStyle='#d8dce6';ctx.fillRect(5,bodyTop,10,bodyBot-bodyTop);
  ctx.fillStyle='#e4e8f0';
  ctx.beginPath();ctx.moveTo(-13,bodyTop);ctx.lineTo(-4,bodyTop);ctx.lineTo(-7,bodyTop+16);ctx.lineTo(-13,bodyTop+18);ctx.fill();
  ctx.beginPath();ctx.moveTo(15,bodyTop);ctx.lineTo(6,bodyTop);ctx.lineTo(6,bodyTop+16);ctx.lineTo(15,bodyTop+14);ctx.fill();
  ctx.fillStyle='#5b9bd5';ctx.fillRect(-3,bodyTop,8,9);
  ctx.strokeStyle='#b8bcc8';ctx.lineWidth=1;
  ctx.strokeRect(-10,bodyTop+8,8,9);
  ctx.fillStyle='#a8b0c0';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,bodyTop+14+i*7,1.4,0,Math.PI*2);ctx.fill();}

  const armSwing=isDead?-22:Math.sin(lp-0.3)*9;
  ctx.fillStyle='#e4e8f0';
  ctx.save();ctx.translate(8,bodyTop+6);ctx.rotate(armSwing*Math.PI/180);
  ctx.fillRect(-3,0,7,16);
  ctx.fillStyle='#f5c98a';ctx.beginPath();ctx.ellipse(0,17,4,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.fillStyle='#d4d8e0';
  ctx.save();ctx.translate(-7,bodyTop+6);ctx.rotate(-armSwing*Math.PI/180);
  ctx.fillRect(-4,0,7,14);ctx.restore();

  const neckY=bodyTop-7;
  ctx.fillStyle='#f5c98a';ctx.fillRect(-3,neckY,6,7);

  const headCY=neckY-13;
  ctx.fillStyle='#f5c98a';
  ctx.beginPath();ctx.ellipse(2,headCY,11,12,0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0b87a';
  ctx.beginPath();ctx.ellipse(-7,headCY,3.5,4.5,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#2c1810';
  ctx.beginPath();ctx.ellipse(7,headCY-2,2.6,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(8,headCY-3,1.1,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#b08050';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(4,headCY-7);ctx.quadraticCurveTo(8,headCY-9,11,headCY-7);ctx.stroke();
  ctx.fillStyle='#e8a870';
  ctx.beginPath();ctx.moveTo(11,headCY-1);ctx.lineTo(14,headCY+3);ctx.lineTo(11,headCY+4);ctx.fill();
  ctx.strokeStyle='#c07050';ctx.lineWidth=1.1;
  ctx.beginPath();ctx.moveTo(9,headCY+6);ctx.quadraticCurveTo(12,headCY+8,10,headCY+10);ctx.stroke();

  const hairCY=headCY-10;
  ctx.fillStyle='#f0c030';
  ctx.beginPath();ctx.ellipse(-1,hairCY,12,9,0.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7,hairCY,6,7,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8b428';
  ctx.beginPath();ctx.moveTo(-10,hairCY+2);ctx.quadraticCurveTo(-26,hairCY+5,-30,hairCY+16);
  ctx.quadraticCurveTo(-28,hairCY+24,-20,hairCY+20);ctx.quadraticCurveTo(-16,hairCY+16,-12,hairCY+10);ctx.fill();
  ctx.fillStyle='#e05080';
  ctx.beginPath();ctx.arc(-13,hairCY+3,2.5,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawExam(obs) {
  const {x,y,w,h}=obs;
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(x+3,y+3,w,h);
  ctx.fillStyle='#fffde7';ctx.fillRect(x,y,w,h);
  ctx.fillStyle='#f5e070';
  ctx.beginPath();ctx.moveTo(x+w-8,y);ctx.lineTo(x+w,y+8);ctx.lineTo(x+w,y);ctx.fill();
  ctx.strokeStyle='#e6c000';ctx.lineWidth=1.5;ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle='#fbc02d';ctx.lineWidth=0.8;
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(x+5,y+h*i/5);ctx.lineTo(x+w-8,y+h*i/5);ctx.stroke();}
  ctx.fillStyle='#c0392b';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText('6!',x+w/2,y+15);
  ctx.fillStyle='#795548';ctx.font='7px sans-serif';
  ctx.fillText('Chemie',x+w/2,y+h-4);
  ctx.textAlign='left';
}

function drawStartScreen() {
  ctx.fillStyle='rgba(10,15,45,0.80)';
  ctx.beginPath();ctx.roundRect(W/2-160,H/2-80,320,162,14);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='500 18px sans-serif';ctx.textAlign='center';
  ctx.fillText('Du bist Kathy!',W/2,H/2-52);
  ctx.fillStyle='#c9e8f5';ctx.font='12px sans-serif';
  ['Du willst dein Chemiestudium schaffen.','Doch die Klausuren stehen dir im Weg!','','Springe über die Klausuren,','um sie zu bestehen!'].forEach((l,i)=>ctx.fillText(l,W/2,H/2-30+i*18));
  ctx.fillStyle='#ffd060';ctx.font='500 14px sans-serif';
  ctx.fillText('Tippen zum Starten',W/2,H/2+66);
  ctx.textAlign='left';
}

function drawDeadScreen() {
  const canRestart = deathFrame >= RESTART_DELAY;
  // Progress bar showing how long until restart is enabled
  const progress = Math.min(deathFrame / RESTART_DELAY, 1);

  ctx.fillStyle='rgba(70,8,8,0.82)';
  ctx.beginPath();ctx.roundRect(W/2-155,H/2-82,310,168,14);ctx.fill();

  ctx.fillStyle='#ff6b6b';ctx.font='500 20px sans-serif';ctx.textAlign='center';
  ctx.fillText('Durchgefallen!',W/2,H/2-52);
  ctx.fillStyle='#fff';ctx.font='12px sans-serif';
  ctx.fillText('Du bist durch eine Klausur gestolpert.',W/2,H/2-26);
  ctx.fillText("Nicht schlimm — probier's nochmal!",W/2,H/2-8);
  ctx.fillStyle='#ffd060';ctx.font='500 15px sans-serif';
  ctx.fillText('Punkte: '+score,W/2,H/2+18);
  ctx.fillStyle='#c9e8f5';ctx.font='13px sans-serif';
  ctx.fillText('Highscore: '+hiScore,W/2,H/2+38);

  // Progress bar or restart hint
  if(!canRestart) {
    // Track
    const bw=180, bh=6, bx=W/2-bw/2, by=H/2+56;
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
    // Fill
    ctx.fillStyle='#ffd060';
    ctx.beginPath();ctx.roundRect(bx,by,bw*progress,bh,3);ctx.fill();
  } else {
    ctx.fillStyle='#ffd060';ctx.font='500 13px sans-serif';
    ctx.fillText('Tippen zum Neustarten',W/2,H/2+62);
  }
  ctx.textAlign='left';
}

function spawnObstacle(){
  const h=30+Math.random()*32,w=22+Math.random()*18;
  obstacles.push({x:W+10,y:GROUND_Y-h,w,h});
}

function checkCollision(k,obs){
  const m=5;
  return(k.x-k.w/2+m<obs.x+obs.w-m&&k.x+k.w/2-m>obs.x+m&&k.y-k.h+m*2<obs.y+obs.h&&k.y-m>obs.y);
}

function update(){
  if(state==='running'){
    bgX+=speed*0.55;
    clouds.forEach(c=>{c.x-=0.22;if(c.x<-60)c.x=W+60;});
    frame++;score=Math.floor(frame/6);
    speed=4.5+score*0.008;if(speed>15)speed=15;
    kathy.vy+=GRAVITY;kathy.y+=kathy.vy;
    if(kathy.y>=GROUND_Y){kathy.y=GROUND_Y;kathy.vy=0;kathy.onGround=true;}
    kathy.leg+=kathy.onGround?0.24:0;
    nextObs--;
    if(nextObs<=0){
      spawnObstacle();
      nextObs=Math.floor(68+Math.random()*55-score*0.09);
      if(nextObs<38)nextObs=38;
    }
    obstacles.forEach(o=>o.x-=speed);
    obstacles=obstacles.filter(o=>o.x+o.w>-20);
    for(let obs of obstacles){
      if(checkCollision(kathy,obs)){
        state='dead';
        if(score>hiScore) hiScore=score;
        deathFrame=0;flashAlpha=1;
        kathyDead={x:kathy.x,y:kathy.y,leg:kathy.leg};
      }
    }
    document.getElementById('score-display').textContent='Punkte: '+score;
    document.getElementById('hi-display').textContent='Best: '+hiScore;
  }
  if(state==='dead'){
    deathFrame++;
    flashAlpha=Math.max(0,flashAlpha-0.05);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  obstacles.forEach(o=>drawExam(o));
  if(state==='dead'){
    drawKathy(kathyDead.x,kathyDead.y,kathyDead.leg,true,deathFrame);
  } else {
    drawKathy(kathy.x,kathy.y,kathy.leg,false,0);
  }
  if(flashAlpha>0){ctx.fillStyle=`rgba(220,50,50,${flashAlpha})`;ctx.fillRect(0,0,W,H);}
  if(state==='idle') drawStartScreen();
  if(state==='dead'&&deathFrame>20) drawDeadScreen();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
